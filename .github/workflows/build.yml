name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Accept Android SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/usr/local/lib/android/sdk --licenses
          echo "SDK licenses accepted"

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # ── Generate .env from GitHub Secrets ──
      - name: Generate .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }}
          FIREBASE_WEB_AUTH_DOMAIN=${{ secrets.FIREBASE_WEB_AUTH_DOMAIN }}
          FIREBASE_WEB_MEASUREMENT_ID=${{ secrets.FIREBASE_WEB_MEASUREMENT_ID }}
           FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }}
           FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}
           FCM_SERVER_KEY=${{ secrets.FCM_SERVER_KEY }}
          ENVEOF
          # Remove any leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env
          echo "✅ .env generated with $(wc -l < .env) keys"

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release-keystore.jks
          echo "Keystore decoded"

      - name: Build split APKs
        run: |
          flutter build apk --release --split-per-abi \
            --android-skip-build-dependency-validation \
            --dart-define-from-file=.env
          echo "APKs built"
        env:
          RELEASE_KEYSTORE_PATH: /tmp/release-keystore.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Build Web
        run: |
          flutter build web --release \
            --dart-define-from-file=.env

      - name: List build outputs
        run: |
          ls -lh build/app/outputs/flutter-apk/
          ls -lh build/web/

      # ── Clean up secrets ──
      - name: Remove .env
        if: always()
        run: rm -f .env

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Flow v${{ steps.version.outputs.version }}
          body: |
            ## Flow v${{ steps.version.outputs.version }}

            ### Downloads
            - [APK arm64-v8a](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/app-arm64-v8a-release.apk) — for most modern Android phones
            - [APK armeabi-v7a](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/app-armeabi-v7a-release.apk) — for older Android devices
            - [APK x86_64](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/app-x86_64-release.apk) — for emulators / Chromebooks
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          fail_on_unmatched_files: true
          overwrite: true
