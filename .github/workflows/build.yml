name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: Accept Android SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/usr/local/lib/android/sdk --licenses
          echo "SDK licenses accepted"

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Create firebase_options.dart
        run: |
          cat > lib/firebase_options.dart << 'DARTEOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) return web;
              switch (defaultTargetPlatform) {
                case TargetPlatform.android: return android;
                case TargetPlatform.iOS: return ios;
                case TargetPlatform.macOS: return macos;
                case TargetPlatform.windows: return windows;
                case TargetPlatform.linux: return web;
                case TargetPlatform.fuchsia: throw UnsupportedError('fuchsia');
              }
            }

            static FirebaseOptions get web => FirebaseOptions(
                  apiKey: _env('FIREBASE_WEB_API_KEY'),
                  appId: _env('FIREBASE_WEB_APP_ID'),
                  messagingSenderId: _env('FIREBASE_MESSAGING_SENDER_ID'),
                  projectId: _env('FIREBASE_PROJECT_ID'),
                  authDomain: _env('FIREBASE_WEB_AUTH_DOMAIN'),
                  databaseURL: _env('FIREBASE_DATABASE_URL'),
                  storageBucket: _env('FIREBASE_STORAGE_BUCKET'),
                  measurementId: _env('FIREBASE_WEB_MEASUREMENT_ID'),
                );

            static FirebaseOptions get android => FirebaseOptions(
                  apiKey: _env('FIREBASE_ANDROID_API_KEY'),
                  appId: _env('FIREBASE_ANDROID_APP_ID'),
                  messagingSenderId: _env('FIREBASE_MESSAGING_SENDER_ID'),
                  projectId: _env('FIREBASE_PROJECT_ID'),
                  databaseURL: _env('FIREBASE_DATABASE_URL'),
                  storageBucket: _env('FIREBASE_STORAGE_BUCKET'),
                );

            static FirebaseOptions get ios => FirebaseOptions(
                  apiKey: _env('FIREBASE_IOS_API_KEY'),
                  appId: _env('FIREBASE_IOS_APP_ID'),
                  messagingSenderId: _env('FIREBASE_MESSAGING_SENDER_ID'),
                  projectId: _env('FIREBASE_PROJECT_ID'),
                  databaseURL: _env('FIREBASE_DATABASE_URL'),
                  storageBucket: _env('FIREBASE_STORAGE_BUCKET'),
                  iosClientId: _env('FIREBASE_IOS_CLIENT_ID'),
                  iosBundleId: 'com.izutec.flow',
                );

            static FirebaseOptions get macos => FirebaseOptions(
                  apiKey: _env('FIREBASE_MACOS_API_KEY', _env('FIREBASE_IOS_API_KEY')),
                  appId: _env('FIREBASE_MACOS_APP_ID', _env('FIREBASE_IOS_APP_ID')),
                  messagingSenderId: _env('FIREBASE_MESSAGING_SENDER_ID'),
                  projectId: _env('FIREBASE_PROJECT_ID'),
                  databaseURL: _env('FIREBASE_DATABASE_URL'),
                  storageBucket: _env('FIREBASE_STORAGE_BUCKET'),
                  iosClientId: _env('FIREBASE_MACOS_CLIENT_ID', _env('FIREBASE_IOS_CLIENT_ID')),
                  iosBundleId: 'com.izutec.flow',
                );

            static FirebaseOptions get windows => FirebaseOptions(
                  apiKey: _env('FIREBASE_WINDOWS_API_KEY'),
                  appId: _env('FIREBASE_WINDOWS_APP_ID'),
                  messagingSenderId: _env('FIREBASE_MESSAGING_SENDER_ID'),
                  projectId: _env('FIREBASE_PROJECT_ID'),
                  authDomain: _env('FIREBASE_WINDOWS_AUTH_DOMAIN'),
                  databaseURL: _env('FIREBASE_DATABASE_URL'),
                  storageBucket: _env('FIREBASE_STORAGE_BUCKET'),
                  measurementId: _env('FIREBASE_WINDOWS_MEASUREMENT_ID'),
                );

            static String _env(String key, [String fallback = '']) =>
                String.fromEnvironment(key, defaultValue: fallback);
          }
          DARTEOF
          echo "firebase_options.dart created"

      - name: Build APK
        run: |
          flutter build apk --release \
            --android-skip-build-dependency-validation \
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }} \
            --dart-define=FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }} \
            --dart-define=FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }} \
            --dart-define=FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }} \
            --dart-define=FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }} \
            --dart-define=FIREBASE_WEB_APP_ID=${{ secrets.FIREBASE_WEB_APP_ID }} \
            --dart-define=FIREBASE_WEB_AUTH_DOMAIN=${{ secrets.FIREBASE_WEB_AUTH_DOMAIN }} \
            --dart-define=FIREBASE_WEB_MEASUREMENT_ID=${{ secrets.FIREBASE_WEB_MEASUREMENT_ID }} \
            --dart-define=FIREBASE_ANDROID_API_KEY=${{ secrets.FIREBASE_ANDROID_API_KEY }} \
            --dart-define=FIREBASE_ANDROID_APP_ID=${{ secrets.FIREBASE_ANDROID_APP_ID }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
